services:
  frontend:
    image: frontend
    build: ./frontend
    depends_on:
      - auth
      - game
    restart: on-failure
    #! frontend dev mode
    volumes:
      - ./frontend:/app
      - frontend-modules:/app/node_modules
    expose:
      - 5173
    command: npm run dev

  nginx:
    image: nginx
    build: ./nginx
    ports:
      - "8443:443"
    depends_on:
      - frontend
      - auth
      - game
    restart: on-failure

  db-init:
    image: db-init
    build: ./scripts/db-init
    volumes:
      - sqlite-data:/data
  auth:
    image: auth
    build: ./services/auth
    volumes:
      - ./services/auth:/app
      - auth-modules:/app/node_modules
      - sqlite-data:/data
    depends_on:
      - db-init
    restart: on-failure
  game:
    image: game
    build: ./services/game
    volumes:
      - ./services/game:/app
      - game-modules:/app/node_modules
      - sqlite-data:/data
    depends_on:
      - db-init
    restart: on-failure

networks:
  transcendence_net:
    driver: bridge

volumes:
  sqlite-data:
    driver: local
    driver_opts:
      type: none
      device: ./data
      o: bind
  #! dev modules
  frontend-modules:
    driver: local
    driver_opts:
      type: none
      device: ./frontend/node_modules
      o: bind
  auth-modules:
    driver: local
    driver_opts:
      type: none
      device: ./services/auth/node_modules
      o: bind
  game-modules:
    driver: local
    driver_opts:
      type: none
      device: ./services/game/node_modules
      o: bind